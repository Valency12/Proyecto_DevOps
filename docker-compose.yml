# PlusZone — API Node + servicio Python + frontend estático (nginx)
# Uso: docker compose up --build
# Requiere server/.env con DATABASE_URL, SUPABASE_*, etc. (no subir .env al repo)

services:
  python-match:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: pluszone-python
    ports:
      - "5050:5050"
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pluszone-api
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    environment:
      # Dentro de Docker, el proxy al servicio Python usa el nombre del servicio
      PYTHON_SERVICE_URL: http://python-match:5050
      NODE_OPTIONS: --dns-result-order=ipv4first
    depends_on:
      - python-match
    restart: unless-stopped

  client:
    image: nginx:alpine
    container_name: pluszone-client
    volumes:
      - ./client:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    restart: unless-stopped
